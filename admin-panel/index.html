<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tendon Monitor Admin</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { font-size: 24px; font-weight: 500; margin: 0 0 4px; }
    .subtitle { color: var(--text-muted); margin: 0 0 32px; }
    .login-card, .config-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type=text], input[type=password], input[type=number] {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
    }
    input:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
    button {
      padding: 10px 16px;
      font: inherit;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    button.danger { background: var(--danger); }
    .row { display: flex; gap: 12px; align-items: center; }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .table th, .table td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .table th {
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .desc { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--success);
      color: white;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: var(--danger); }
    .section-title {
      font-size: 16px;
      font-weight: 500;
      margin: 32px 0 12px;
    }
    .hidden { display: none; }
    .stat {
      display: inline-block;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 8px;
    }
    .stat.online { background: #dcfce7; color: #166534; border-color: #86efac; }
    .stat.offline { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tendon Monitor Admin</h1>
    <p class="subtitle">Edit runtime configuration without redeploying the app.</p>

    <div id="login" class="login-card">
      <div class="field">
        <label>Supabase URL</label>
        <input type="text" id="url" placeholder="https://yourproject.supabase.co" />
      </div>
      <div class="field">
        <label>Supabase anon key</label>
        <input type="password" id="key" placeholder="eyJhbGci..." />
      </div>
      <div class="field">
        <label>Admin password</label>
        <input type="password" id="password" />
        <div class="desc">Used to gate access to this panel. Set in your environment.</div>
      </div>
      <button id="connect">Connect</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="section-title">Device status</div>
      <div id="devices"></div>

      <div class="section-title">App configuration</div>
      <div class="config-card">
        <div id="config-rows"></div>
        <div class="row" style="margin-top: 16px;">
          <button id="save">Save changes</button>
          <button class="secondary" id="refresh">Refresh</button>
          <button class="secondary" id="logout" style="margin-left: auto;">Logout</button>
        </div>
      </div>

      <div class="section-title">Recent readings</div>
      <div id="readings"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
